name: walkie_talkie
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  lottie: ^3.3.2
  smooth_page_indicator: ^1.1.0
  dio: ^5.9.0
  shared_preferences: ^2.5.4
  flutter_dotenv: ^6.0.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  hive_flutter: ^1.1.0
  web_socket_channel: ^3.0.3
  flutter_contacts: null
  permission_handler: null
  photo_manager: ^3.0.0
  just_audio: null
  audio_session: null
  get_country_code_by_name: ^0.0.8
  hive : null 
  flutter_bloc : null 
  flutter_offline: ^6.0.0


dev_dependencies:
  hive_generator: null
  build_runner: ^2.4.6
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/appIcons/
    - assets/font/
    - assets/images/
    - assets/lottie/
    - walkie_talkie.env

  fonts:
    - family: digital
      fonts:
        - asset: assets/font/digital7.ttf
          weight: 400
